<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Evening Raga — Chord Book</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  /* ===========================================================
     EVENING RAGA — Chord Book
     A library-quiet, paper-and-ink aesthetic.
     =========================================================== */

  :root {
    --bg:           #f4eede;
    --bg-grain:     #efe7d2;
    --surface:      #fbf7ec;
    --surface-2:    #ede4ce;
    --surface-3:    #e3d8bd;
    --border:       #d6c9a8;
    --border-soft:  #e6dcc1;
    --border-strong:#b3a17a;
    --rule:         #c9b88e;
    --text:         #261d12;
    --text-soft:    #4a3d2c;
    --text-muted:   #8a7857;
    --accent:       #8a2a1a;
    --accent-2:     #b46a3a;
    --accent-soft:  rgba(138,42,26,0.10);
    --chord:        #8a2a1a;
    --chord-bg:     rgba(138,42,26,0.07);
    --chord-bg-2:   rgba(138,42,26,0.18);
    --section:      #5b6b3a;
    --section-bg:   rgba(91,107,58,0.10);
    --gold:         #a47832;
    --gold-soft:    rgba(164,120,50,0.14);
    --shadow-sm:    0 1px 2px rgba(60,40,15,0.05);
    --shadow:       0 1px 2px rgba(60,40,15,0.05), 0 6px 22px rgba(60,40,15,0.07);
    --shadow-lg:    0 2px 6px rgba(60,40,15,0.08), 0 12px 32px rgba(60,40,15,0.10);

    --serif:        'EB Garamond', 'Iowan Old Style', 'Cambria', Georgia, serif;
    --display:      'Cormorant Garamond', 'Iowan Old Style', Georgia, serif;
    --mono:         'JetBrains Mono', 'SF Mono', 'Menlo', 'Consolas', 'Courier New', monospace;
    --sans:         -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  }

  [data-theme="dark"] {
    --bg:           #0f0c07;
    --bg-grain:     #14110a;
    --surface:      #18140c;
    --surface-2:    #221c11;
    --surface-3:    #2c2417;
    --border:       #34291a;
    --border-soft:  #261f12;
    --border-strong:#5a4a30;
    --rule:         #4a3a22;
    --text:         #ede2c5;
    --text-soft:    #c8b88f;
    --text-muted:   #8a7853;
    --accent:       #d97a4f;
    --accent-2:     #e8a06d;
    --accent-soft:  rgba(217,122,79,0.13);
    --chord:        #e89569;
    --chord-bg:     rgba(232,149,105,0.10);
    --chord-bg-2:   rgba(232,149,105,0.22);
    --section:      #a4b87e;
    --section-bg:   rgba(164,184,126,0.10);
    --gold:         #d4a652;
    --gold-soft:    rgba(212,166,82,0.14);
    --shadow-sm:    0 1px 2px rgba(0,0,0,0.4);
    --shadow:       0 1px 2px rgba(0,0,0,0.4), 0 6px 22px rgba(0,0,0,0.5);
    --shadow-lg:    0 2px 6px rgba(0,0,0,0.5), 0 12px 32px rgba(0,0,0,0.6);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: var(--serif);
    font-size: 16px;
    line-height: 1.55;
    background:
      radial-gradient(at 18% 8%, var(--bg-grain), transparent 60%),
      radial-gradient(at 84% 92%, var(--bg-grain), transparent 60%),
      var(--bg);
    color: var(--text);
    min-height: 100vh;
    transition: background 0.4s, color 0.4s;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  ::selection { background: var(--chord-bg-2); color: var(--text); }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    gap: 14px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: var(--shadow-sm);
    flex-wrap: wrap;
  }
  .h-left { display: flex; align-items: center; gap: 12px; flex: 1; min-width: 0; }
  header h1 {
    font-family: var(--display);
    font-size: 1.6rem;
    font-weight: 500;
    letter-spacing: 0.02em;
    color: var(--accent);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    font-style: italic;
  }
  header h1 .sub {
    color: var(--text-muted);
    font-size: 0.78rem;
    font-style: normal;
    margin-left: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    font-family: var(--sans);
    font-weight: 400;
  }
  .back-btn {
    background: transparent;
    border: 1px solid var(--border-strong);
    border-radius: 999px;
    color: var(--text-soft);
    cursor: pointer;
    padding: 7px 14px;
    font-size: 0.78rem;
    font-family: var(--sans);
    letter-spacing: 0.14em;
    text-transform: uppercase;
    display: none;
    align-items: center;
    gap: 6px;
    transition: all 0.2s ease;
  }
  .back-btn:hover { background: var(--accent); color: white; border-color: var(--accent); }
  .back-btn.visible { display: inline-flex; }

  .h-right { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }

  .chip {
    display: inline-flex; align-items: center; gap: 7px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 5px 11px;
    font-size: 0.74rem;
    font-family: var(--sans);
    color: var(--text-soft);
    letter-spacing: 0.06em;
  }
  .chip label {
    cursor: pointer;
    user-select: none;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    font-weight: 500;
  }
  .icon-btn {
    width: 24px; height: 24px;
    border-radius: 50%;
    border: 1px solid transparent;
    background: transparent;
    color: var(--text-soft);
    cursor: pointer;
    font-size: 0.95rem;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition: all 0.18s;
    font-family: var(--sans);
    font-weight: 600;
  }
  .icon-btn:hover { background: var(--accent); color: white; }
  .icon-btn:disabled { opacity: 0.3; cursor: default; }
  .icon-btn:disabled:hover { background: transparent; color: var(--text-soft); }
  .pill {
    min-width: 30px;
    text-align: center;
    font-size: 0.78rem;
    font-weight: 600;
    color: var(--accent);
    background: var(--chord-bg);
    border-radius: 4px;
    padding: 1px 6px;
    font-family: var(--mono);
  }

  .switch {
    width: 30px; height: 16px;
    background: var(--border-strong);
    border-radius: 999px;
    position: relative;
    cursor: pointer;
    transition: background 0.3s;
    flex-shrink: 0;
  }
  .switch.on { background: var(--accent); }
  .switch::after {
    content: '';
    position: absolute;
    width: 12px; height: 12px;
    background: var(--surface);
    border-radius: 50%;
    top: 2px; left: 2px;
    transition: left 0.3s, background 0.3s;
    box-shadow: 0 1px 2px rgba(0,0,0,0.25);
  }
  .switch.on::after { left: 16px; }

  #list-view { max-width: 760px; margin: 0 auto; padding: 38px 22px 80px; }

  .hero {
    text-align: center;
    margin-bottom: 36px;
    padding-bottom: 28px;
    border-bottom: 1px solid var(--rule);
    position: relative;
  }
  .hero::before {
    content: '✦';
    position: absolute;
    bottom: -10px;
    left: 50%;
    transform: translateX(-50%);
    color: var(--gold);
    font-size: 0.9rem;
    background: var(--bg);
    padding: 0 12px;
  }

  .hero-title {
    font-family: var(--display);
    font-size: 2.6rem;
    font-weight: 400;
    color: var(--accent);
    letter-spacing: 0.01em;
    font-style: italic;
    line-height: 1.1;
    margin-bottom: 6px;
  }
  .hero-subtitle {
    font-family: var(--sans);
    color: var(--text-muted);
    font-size: 0.78rem;
    letter-spacing: 0.32em;
    text-transform: uppercase;
  }
  .hero-count {
    font-family: var(--mono);
    color: var(--accent);
    font-weight: 600;
  }

  .search-bar {
    position: relative;
    margin-bottom: 28px;
  }
  .search-bar input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 12px 18px 12px 42px;
    font-family: var(--serif);
    font-size: 1rem;
    font-style: italic;
    color: var(--text);
    box-shadow: var(--shadow-sm);
    outline: none;
    transition: all 0.2s;
  }
  .search-bar input::placeholder { color: var(--text-muted); opacity: 0.7; }
  .search-bar input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--chord-bg);
  }
  .search-bar::before {
    content: '⌕';
    position: absolute;
    left: 18px; top: 50%;
    transform: translateY(-50%);
    font-size: 1.1rem;
    color: var(--text-muted);
    font-family: var(--display);
  }

  .set-header {
    text-align: center;
    margin: 6px 0 18px;
    padding: 0 0 8px;
  }
  .set-header.first { margin-top: 0; }
  .set-header .set-eyebrow {
    font-family: var(--sans);
    font-size: 0.7rem;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 4px;
  }
  .set-header .set-title {
    font-family: var(--display);
    font-style: italic;
    font-size: 1.4rem;
    color: var(--accent);
    font-weight: 500;
  }

  .break-divider {
    margin: 30px 0 28px;
    text-align: center;
    position: relative;
    height: 28px;
  }
  .break-divider::before {
    content: '';
    position: absolute;
    left: 0; right: 0; top: 50%;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--rule) 20%, var(--rule) 80%, transparent);
  }
  .break-divider .label {
    position: relative;
    display: inline-block;
    background: var(--bg);
    padding: 0 18px;
    font-family: var(--display);
    font-style: italic;
    font-size: 1.05rem;
    color: var(--gold);
    letter-spacing: 0.16em;
    line-height: 28px;
  }
  .break-divider .label::before,
  .break-divider .label::after {
    content: '✦';
    margin: 0 8px;
    color: var(--gold);
    opacity: 0.6;
  }

  .song-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 14px 18px;
    margin-bottom: 7px;
    cursor: pointer;
    display: flex;
    align-items: baseline;
    gap: 14px;
    transition: all 0.2s ease;
    box-shadow: var(--shadow-sm);
    position: relative;
  }
  .song-item:hover {
    border-color: var(--accent);
    box-shadow: var(--shadow);
    transform: translateX(2px);
  }
  .song-item:hover::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--accent);
    border-radius: 6px 0 0 6px;
  }
  .song-num {
    font-family: var(--mono);
    font-size: 0.78rem;
    color: var(--text-muted);
    min-width: 28px;
    font-weight: 500;
    letter-spacing: 0.04em;
  }
  .song-title {
    flex: 1;
    font-family: var(--display);
    font-size: 1.18rem;
    font-weight: 500;
    color: var(--text);
    letter-spacing: 0.01em;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .song-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }
  .song-key {
    font-size: 0.7rem;
    color: var(--accent);
    background: var(--chord-bg);
    padding: 3px 9px;
    border-radius: 999px;
    font-family: var(--mono);
    font-weight: 600;
    letter-spacing: 0.02em;
    border: 1px solid var(--chord-bg-2);
  }
  .song-remark {
    font-size: 0.7rem;
    color: var(--section);
    background: var(--section-bg);
    padding: 3px 10px;
    border-radius: 999px;
    font-style: italic;
    font-family: var(--serif);
    max-width: 180px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    border: 1px solid rgba(91,107,58,0.18);
  }
  .song-arrow {
    color: var(--text-muted);
    font-size: 1.1rem;
    opacity: 0.45;
    transition: all 0.2s;
    font-family: var(--display);
  }
  .song-item:hover .song-arrow {
    color: var(--accent);
    opacity: 1;
    transform: translateX(3px);
  }

  .no-results {
    text-align: center;
    color: var(--text-muted);
    padding: 50px 20px;
    font-style: italic;
    font-size: 1.05rem;
  }

  #chord-view { display: none; padding: 28px 18px 80px; }
  .chord-frame { max-width: 920px; margin: 0 auto; }

  .chord-header {
    text-align: center;
    margin-bottom: 28px;
    padding-bottom: 22px;
    border-bottom: 1px solid var(--rule);
    position: relative;
  }
  .chord-header h2 {
    font-family: var(--display);
    font-size: 2.4rem;
    font-weight: 500;
    color: var(--accent);
    letter-spacing: 0.01em;
    line-height: 1.15;
    font-style: italic;
  }
  .chord-meta {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 14px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .meta-tag {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: var(--chord-bg);
    color: var(--accent);
    padding: 4px 13px;
    border-radius: 999px;
    font-size: 0.74rem;
    font-family: var(--mono);
    font-weight: 600;
    letter-spacing: 0.04em;
    border: 1px solid var(--chord-bg-2);
  }
  .meta-tag.remark-tag {
    background: var(--section-bg);
    color: var(--section);
    border-color: rgba(91,107,58,0.20);
    font-style: italic;
    font-family: var(--serif);
    font-weight: 400;
    letter-spacing: 0;
  }

  .chord-content {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 36px 40px 40px;
    box-shadow: var(--shadow);
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    position: relative;
  }
  .chord-content::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: linear-gradient(90deg, var(--accent), var(--gold), var(--accent));
    opacity: 0.45;
    border-radius: 4px 4px 0 0;
  }
  .chord-content .scroll-inner { min-width: min-content; }

  .chord-line, .lyric-line, .plain-line {
    font-family: var(--mono);
    white-space: pre;
    line-height: 1.5;
    margin: 0;
  }
  .chord-line {
    color: var(--chord);
    font-weight: 600;
    font-size: 0.92rem;
    letter-spacing: 0.01em;
    margin-top: 4px;
  }
  .lyric-line {
    color: var(--text);
    font-size: 0.96rem;
    margin-bottom: 2px;
    font-weight: 400;
    letter-spacing: 0.005em;
  }
  .plain-line {
    color: var(--text-soft);
    font-size: 0.9rem;
    font-style: italic;
  }
  .chord-token {
    background: var(--chord-bg);
    border-radius: 3px;
    padding: 0 3px;
    color: var(--chord);
  }

  .section-label {
    display: inline-block;
    color: var(--section);
    background: var(--section-bg);
    font-family: var(--sans);
    font-weight: 600;
    font-size: 0.7rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    padding: 5px 14px;
    border-radius: 999px;
    margin: 22px 0 10px;
    border: 1px solid rgba(91,107,58,0.20);
  }
  .section-label:first-child { margin-top: 0; }

  .blank-line { height: 0.7em; }

  .page-marker {
    display: block;
    color: var(--text-muted);
    font-family: var(--mono);
    font-size: 0.7rem;
    text-align: right;
    margin: 14px 0 4px;
    opacity: 0.55;
    border-top: 1px dashed var(--border);
    padding-top: 4px;
  }

  body.chords-off .chord-line { display: none; }
  body.chords-off .chord-token {
    background: transparent;
    color: inherit;
    font-weight: inherit;
    padding: 0;
  }
  body.chords-off .meta-tag.key-tag { opacity: 0.4; }
  body.chords-off .inline-line .chord-token { display: none; }

  .song-nav {
    margin-top: 26px;
    display: flex;
    justify-content: space-between;
    gap: 14px;
  }
  .nav-btn {
    flex: 1;
    max-width: 320px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 11px 20px;
    cursor: pointer;
    color: var(--text-soft);
    font-size: 0.82rem;
    font-family: var(--sans);
    letter-spacing: 0.06em;
    transition: all 0.2s ease;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    box-shadow: var(--shadow-sm);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .nav-btn.next { justify-content: flex-end; }
  .nav-btn:hover:not(:disabled) {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
    transform: translateY(-1px);
  }
  .nav-btn:disabled { opacity: 0.3; cursor: default; }

  body.fs-sm .chord-line  { font-size: 0.80rem; }
  body.fs-sm .lyric-line  { font-size: 0.83rem; }
  body.fs-sm .plain-line  { font-size: 0.78rem; }
  body.fs-lg .chord-line  { font-size: 1.06rem; }
  body.fs-lg .lyric-line  { font-size: 1.10rem; }
  body.fs-lg .plain-line  { font-size: 1.00rem; }
  body.fs-xl .chord-line  { font-size: 1.22rem; }
  body.fs-xl .lyric-line  { font-size: 1.26rem; }
  body.fs-xl .plain-line  { font-size: 1.14rem; }

  .chord-content::-webkit-scrollbar { height: 8px; }
  .chord-content::-webkit-scrollbar-track { background: var(--surface-2); border-radius: 4px; }
  .chord-content::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 4px; }
  .chord-content::-webkit-scrollbar-thumb:hover { background: var(--accent); }

  .scroll-top {
    position: fixed;
    bottom: 26px; right: 26px;
    width: 44px; height: 44px;
    background: var(--accent);
    color: white;
    border: 1px solid var(--accent);
    border-radius: 50%;
    cursor: pointer;
    font-size: 1.05rem;
    box-shadow: var(--shadow-lg);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s, transform 0.3s;
    z-index: 50;
    font-family: var(--display);
  }
  .scroll-top.visible { opacity: 0.94; pointer-events: auto; }
  .scroll-top:hover { transform: translateY(-3px); opacity: 1; }

  @media (max-width: 740px) {
    header { padding: 11px 14px; gap: 8px; }
    header h1 { font-size: 1.15rem; }
    header h1 .sub { display: none; }
    .chip { font-size: 0.68rem; padding: 4px 9px; gap: 5px; }
    .chord-content { padding: 22px 18px 26px; }
    .chord-header h2 { font-size: 1.6rem; }
    .hero-title { font-size: 2rem; }
    #chord-view { padding: 18px 10px 60px; }
    .nav-btn { font-size: 0.74rem; padding: 9px 14px; }
    .song-title { font-size: 1.05rem; }
    .song-remark { display: none; }
  }
  @media (max-width: 480px) {
    .h-right { width: 100%; justify-content: flex-end; }
    .chip.font-ctrl { display: none; }
    .song-key { font-size: 0.66rem; }
  }

  @media print {
    header, .song-nav, .back-btn, .chip, .h-right, .scroll-top { display: none !important; }
    .chord-content { border: none; box-shadow: none; padding: 0; }
    .chord-content::before { display: none; }
    body { background: white; color: black; }
    .chord-line, .chord-token { color: #8a2a1a !important; }
    .chord-header h2 { color: #8a2a1a !important; }
  }
</style>
</head>
<body>

<header>
  <div class="h-left">
    <button class="back-btn" id="backBtn" onclick="showList()">← Songs</button>
    <h1 id="headerTitle">Evening Raga<span class="sub">Chord Book</span></h1>
  </div>
  <div class="h-right" id="headerControls">
    <div class="chip song-ctrl" id="transposeCtrl" style="display:none">
      <label title="Transpose semitones">Key</label>
      <button class="icon-btn" onclick="transpose(-1)" title="Down">−</button>
      <span class="pill" id="tVal">0</span>
      <button class="icon-btn" onclick="transpose(+1)" title="Up">+</button>
    </div>
    <div class="chip song-ctrl" id="chordToggle" style="display:none">
      <label onclick="toggleChords()">Chords</label>

<script>
  const songsAll = JSON.parse(document.getElementById('songs-data').textContent);
  const songs = songsAll.filter(s => !s.isBreak);

  const CHROMATIC = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
  const FLAT_MAP  = {Db:'C#', Eb:'D#', Fb:'E', Gb:'F#', Ab:'G#', Bb:'A#', Cb:'B'};
  const FLAT_DISPLAY = {'C#':'Db','D#':'Eb','F#':'Gb','G#':'Ab','A#':'Bb'};

  let transposeVal = 0;
  let currentSong = null;
  let useFlatDisplay = false;
  let isDark = false;
  let chordsOn = true;
  let fontSize = 1;

  try {
    const saved = JSON.parse(localStorage.getItem('chordbook_prefs_v2') || '{}');
    if (saved.dark) { isDark = true; document.documentElement.setAttribute('data-theme','dark'); }
    if (saved.chordsOff) { chordsOn = false; document.body.classList.add('chords-off'); }
    if (typeof saved.fs === 'number') fontSize = saved.fs;
  } catch (e) {}
  function savePrefs() {
    try {
      localStorage.setItem('chordbook_prefs_v2', JSON.stringify({
        dark: isDark, chordsOff: !chordsOn, fs: fontSize
      }));
    } catch (e) {}
  }

  function transposeNote(root, n) {
    const norm = FLAT_MAP[root] || root;
    let idx = CHROMATIC.indexOf(norm);
    if (idx === -1) return root;
    idx = ((idx + n) % 12 + 12) % 12;
    const newRoot = CHROMATIC[idx];
    if (useFlatDisplay && FLAT_DISPLAY[newRoot]) return FLAT_DISPLAY[newRoot];
    return newRoot;
  }
  function transposeChordFull(chord, n) {
    if (n === 0) return chord;
    if (chord.includes('/')) {
      const parts = chord.split('/');
      return transposeChordFull(parts[0], n) + '/' + parts.slice(1).map(p => {
        const m2 = p.match(/^([A-G][#b]?)(.*)$/);
        return m2 ? transposeNote(m2[1], n) + m2[2] : p;
      }).join('/');
    }
    const m = chord.match(/^([A-G][#b]?)(.*)$/);
    if (!m) return chord;
    return transposeNote(m[1], n) + m[2];
  }

  function isChordLine(line) {
    const t = line.trim();
    if (!t) return false;
    if (/^\[.+\]$/.test(t)) return false;
    if (/^Page \d+\/\d+$/i.test(t)) return false;
    let stripped = t.replace(/\b[A-G][#b]?(?:maj7?|min7?|m7b5|m7|M7|dim7?|aug|sus[24]?|add\d|m|7|9|11|13|6|5|2)?(?=[\s\/\\|)\]\-,(]|$)/g, '');
    stripped = stripped.replace(/[\s\/\\|.%x×#()\[\]\-,\d*~×]/gi, '');
    stripped = stripped.replace(/N\.C\./g, '');
    return stripped.length <= 3;
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function renderChordOnlyLine(line, n) {
    const result = [];
    let i = 0;
    while (i < line.length) {
      const ch = line[i];
      if (/[A-G]/.test(ch)) {
        const sub = line.slice(i);
        const m = sub.match(/^([A-G][#b]?)((?:maj7?|min7?|m7b5|m7|M7|dim7?|aug|sus[24]?|add\d|m|7|9|11|13|6|5|2)?)/);
        if (m && m[0].length > 0) {
          const rightCh = line[i + m[0].length] || ' ';
          if (/[\s\/\\|)\]\-,(]/.test(rightCh) || (i + m[0].length) === line.length) {
            const orig = m[0];
            const transposed = transposeChordFull(orig, n);
            result.push('<span class="chord-token">' + escHtml(transposed) + '</span>');
            const delta = orig.length - transposed.length;
            if (delta > 0) result.push(' '.repeat(delta));
            if (delta < 0) {
              let need = -delta;
              let j = i + orig.length;
              while (need > 0 && j < line.length && line[j] === ' ') { j++; need--; }
              i = j;
              continue;
            }
            i += orig.length;
            continue;
          }
        }
      }
      result.push(escHtml(ch));
      i++;
    }
    return result.join('');
  }

  function renderInlineBracketLine(line, n) {
    return escHtml(line).replace(/\[([A-G][#b]?[^\[\]]*?)\]/g, (_, chord) => {
      const t = transposeChordFull(chord.trim(), n);
      return '<span class="chord-token">' + escHtml(t) + '</span>';
    });
  }

  function renderChordText(rawText, n) {
    const lines = rawText.split('\n');
    let html = '';
    for (let i = 0; i < lines.length; i++) {
      const line = lines[i];
      const trimmed = line.trim();
      if (!trimmed) { html += '<div class="blank-line"></div>'; continue; }
      if (/^\[[^\[\]]+\]$/.test(trimmed)) {
        const inner = trimmed.slice(1, -1);
        if (/^[A-G][#b]?(?:m|min|maj|dim|aug|sus|add|7|9|6|5|2|11|13)?\d*$/.test(inner.trim())) {
          html += '<div class="lyric-line inline-line">' + renderInlineBracketLine(line, n) + '</div>';
        } else {
          html += '<div class="section-label">' + escHtml(inner) + '</div>';
        }
        continue;
      }
      if (/^Page \d+\/\d+$/i.test(trimmed)) {
        html += '<div class="page-marker">' + escHtml(trimmed) + '</div>';
        continue;
      }
      if (/\[[A-G][#b]?[^\[\]]*?\]/.test(line)) {
        html += '<div class="lyric-line inline-line">' + renderInlineBracketLine(line, n) + '</div>';
        continue;
      }
      if (isChordLine(line)) {
        html += '<div class="chord-line">' + renderChordOnlyLine(line, n) + '</div>';
        continue;
      }
      html += '<div class="lyric-line">' + escHtml(line) + '</div>';
    }
    return html;
  }

  function renderList(filter) {
    const container = document.getElementById('songList');
    container.innerHTML = '';
    const f = (filter || '').toLowerCase().trim();
    let realIndex = 0;
    let setItemCount = 0;

    const setHdr = document.createElement('div');
    setHdr.className = 'set-header first';
    setHdr.innerHTML = '<div class="set-eyebrow">Set One</div><div class="set-title">Pallavi</div>';
    container.appendChild(setHdr);

    let shown = 0;

    songsAll.forEach((song) => {
      if (song.isBreak) {
        if (!f) {
          const div = document.createElement('div');
          div.className = 'break-divider';
          div.innerHTML = '<span class="label">interlude</span>';
          container.appendChild(div);
          const hdr = document.createElement('div');
          hdr.className = 'set-header';
          hdr.innerHTML = '<div class="set-eyebrow">Set Two</div><div class="set-title">Charanam</div>';
          container.appendChild(hdr);
          setItemCount = 0;
        }
        return;
      }
      const i = realIndex++;
      const hay = (song.title + ' ' + (song.key || '') + ' ' + (song.remarks || '')).toLowerCase();
      if (f && hay.indexOf(f) === -1) return;
      shown++;
      setItemCount++;

      const div = document.createElement('div');
      div.className = 'song-item';
      const k = song.key || '';
      div.innerHTML =
        '<span class="song-num">' + String(setItemCount).padStart(2,'0') + '</span>' +
        '<span class="song-title">' + escHtml(song.title) + '</span>' +
        '<span class="song-meta">' +
          (k ? '<span class="song-key">' + escHtml(k) + '</span>' : '') +
          (song.remarks ? '<span class="song-remark" title="' + escHtml(song.remarks) + '">' + escHtml(song.remarks) + '</span>' : '') +
          '<span class="song-arrow">›</span>' +
        '</span>';
      div.onclick = () => openSong(i);
      container.appendChild(div);
    });

    if (f && shown === 0) {
      container.innerHTML = '<div class="no-results">No songs match "' + escHtml(filter || '') + '"</div>';
    }
    document.getElementById('songCount').textContent = songs.length;
  }

  function filterList() {
    renderList(document.getElementById('searchInput').value);
  }

  function openSong(idx) {
    currentSong = idx;
    transposeVal = 0;
    document.getElementById('tVal').textContent = '0';
    renderChordView();
    document.getElementById('list-view').style.display = 'none';
    document.getElementById('chord-view').style.display = 'block';
    document.getElementById('backBtn').classList.add('visible');
    document.querySelectorAll('#headerControls .song-ctrl').forEach(el => el.style.display = 'inline-flex');
    document.getElementById('headerTitle').innerHTML = escHtml(songs[idx].title);
    window.scrollTo(0,0);
  }

  function renderChordView() {
    const song = songs[currentSong];
    document.getElementById('songTitle').textContent = song.title;
    const meta = document.getElementById('chordMeta');
    let metaHtml = '';
    const k = song.key;
    if (k) {
      const tk = transposeChordFull(k, transposeVal);
      metaHtml += '<span class="meta-tag key-tag">Key · ' + escHtml(tk) +
        (transposeVal !== 0 ? ' <span style="opacity:.5">(' + escHtml(k) + ' ' + (transposeVal>0?'+':'') + transposeVal + ')</span>' : '') +
        '</span>';
    }
    if (song.remarks) {
      metaHtml += '<span class="meta-tag remark-tag">' + escHtml(song.remarks) + '</span>';
    }
    meta.innerHTML = metaHtml;

    document.getElementById('prevBtn').disabled = currentSong === 0;
    document.getElementById('nextBtn').disabled = currentSong === songs.length - 1;
    document.getElementById('prevBtn').textContent = currentSong > 0 ? '← ' + songs[currentSong-1].title : '← Prev';
    document.getElementById('nextBtn').textContent = currentSong < songs.length-1 ? songs[currentSong+1].title + ' →' : 'Next →';
    document.getElementById('chordContentInner').innerHTML = renderChordText(song.chords, transposeVal);
  }

  function showList() {
    document.getElementById('list-view').style.display = 'block';
    document.getElementById('chord-view').style.display = 'none';
    document.getElementById('backBtn').classList.remove('visible');
    document.querySelectorAll('#headerControls .song-ctrl').forEach(el => el.style.display = 'none');
    document.getElementById('headerTitle').innerHTML = 'Evening Raga<span class="sub">Chord Book</span>';
    currentSong = null;
    window.scrollTo(0,0);
  }

  function navigateSong(dir) {
    const next = currentSong + dir;
    if (next < 0 || next >= songs.length) return;
    currentSong = next;
    transposeVal = 0;
    document.getElementById('tVal').textContent = '0';
    renderChordView();
    document.getElementById('headerTitle').innerHTML = escHtml(songs[next].title);
    window.scrollTo(0, 0);
  }

  function transpose(n) {
    transposeVal = transposeVal + n;
    if (transposeVal > 11) transposeVal -= 12;
    if (transposeVal < -11) transposeVal += 12;
    document.getElementById('tVal').textContent = (transposeVal > 0 ? '+' : '') + transposeVal;
    renderChordView();
  }

  function toggleTheme() {
    isDark = !isDark;
    document.documentElement.setAttribute('data-theme', isDark ? 'dark' : '');
    document.getElementById('themeSwitch').classList.toggle('on', isDark);
    document.getElementById('themeLabel').textContent = isDark ? '☾' : '☼';
    savePrefs();
  }
  function toggleChords() {
    chordsOn = !chordsOn;
    document.body.classList.toggle('chords-off', !chordsOn);
    document.getElementById('chordSwitch').classList.toggle('on', chordsOn);
    savePrefs();
  }
  function changeFontSize(d) {
    fontSize = Math.max(0, Math.min(3, fontSize + d));
    document.body.classList.remove('fs-sm','fs-md','fs-lg','fs-xl');
    document.body.classList.add(['fs-sm','fs-md','fs-lg','fs-xl'][fontSize]);
    document.getElementById('fsVal').textContent = ['S','M','L','XL'][fontSize];
    savePrefs();
  }

  if (isDark) {
    document.getElementById('themeSwitch').classList.add('on');
    document.getElementById('themeLabel').textContent = '☾';
  }
  if (chordsOn) document.getElementById('chordSwitch').classList.add('on');
  document.body.classList.add(['fs-sm','fs-md','fs-lg','fs-xl'][fontSize]);
  document.getElementById('fsVal').textContent = ['S','M','L','XL'][fontSize];

  const stBtn = document.getElementById('scrollTop');
  window.addEventListener('scroll', () => {
    if (window.scrollY > 400) stBtn.classList.add('visible');
    else stBtn.classList.remove('visible');
  });

  document.addEventListener('keydown', e => {
    if (currentSong === null) return;
    if (e.target && (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA')) return;
    if (e.key === 'ArrowLeft') navigateSong(-1);
    else if (e.key === 'ArrowRight') navigateSong(+1);
    else if (e.key === '=' || e.key === '+') transpose(+1);
    else if (e.key === '-' || e.key === '_') transpose(-1);
    else if (e.key === 'c' || e.key === 'C') toggleChords();
    else if (e.key === 'Escape') showList();
  });

  renderList();
</script>
</body>
